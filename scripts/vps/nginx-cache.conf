# /etc/nginx/conf.d/nginx-cache.conf
# Shared proxy cache zones for zero-downtime deploys.
# During Next.js restart (~10s), nginx serves stale cached pages.
#
# Install:
#   sudo cp nginx-cache.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx

proxy_cache_path /var/cache/nginx/cdm2026-fr levels=1:2 keys_zone=cdm2026fr:10m max_size=1g inactive=60m use_temp_path=off;
proxy_cache_path /var/cache/nginx/wm2026-de levels=1:2 keys_zone=wm2026de:10m max_size=1g inactive=60m use_temp_path=off;
