name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 25m
          script: |
            sudo find /srv/cdm2026/releases/ -maxdepth 1 -mindepth 1 -mmin +60 -exec rm -rf {} + 2>/dev/null || true

            # Auto-provision DE infrastructure if not yet installed
            REPO_DIR="/srv/cdm2026/repo"
            cd "$REPO_DIR" && git fetch origin main && git reset --hard origin/main
            SCRIPT_DIR="${REPO_DIR}/scripts/vps"
            # Always sync latest service file (handles updates like ExecStart path fixes)
            if [ -f "${SCRIPT_DIR}/wm2026-de.service" ]; then
              sudo cp "${SCRIPT_DIR}/wm2026-de.service" /etc/systemd/system/
              sudo systemctl daemon-reload
              sudo systemctl enable wm2026-de 2>/dev/null || true
            fi
            # Install nginx proxy cache for zero-downtime deploys
            if [ -f "${SCRIPT_DIR}/nginx-cache.conf" ] && [ ! -f /etc/nginx/conf.d/nginx-cache.conf ]; then
              echo "[PROVISION] Installing nginx proxy cache config..."
              sudo cp "${SCRIPT_DIR}/nginx-cache.conf" /etc/nginx/conf.d/nginx-cache.conf
              sudo mkdir -p /var/cache/nginx/cdm2026-fr /var/cache/nginx/wm2026-de
              sudo chown www-data:www-data /var/cache/nginx/cdm2026-fr /var/cache/nginx/wm2026-de
              sudo nginx -t && sudo systemctl reload nginx
            fi
            if [ ! -f /etc/nginx/sites-available/wm2026-de ] && [ -f "${SCRIPT_DIR}/wm2026-de.nginx" ]; then
              echo "[PROVISION] Installing nginx config for DE..."
              sudo cp "${SCRIPT_DIR}/wm2026-de.nginx" /etc/nginx/sites-available/wm2026-de
              sudo ln -sf /etc/nginx/sites-available/wm2026-de /etc/nginx/sites-enabled/
              sudo nginx -t && sudo systemctl reload nginx
            fi
            if [ -f /etc/nginx/sites-available/wm2026-de ] && ! grep -q "ssl_certificate" /etc/nginx/sites-available/wm2026-de 2>/dev/null; then
              if command -v certbot &>/dev/null; then
                echo "[PROVISION] Requesting SSL for wm2026guide.de..."
                sudo certbot --nginx -d wm2026guide.de -d www.wm2026guide.de --non-interactive --agree-tos --redirect 2>&1 || echo "[PROVISION] SSL failed — will retry next deploy."
              fi
            fi

            # FR nginx: deploy.sh handles all patching (proxy_cache + static from disk)

            # Sync deploy.sh from repo to VPS (ensures latest version)
            sudo cp "${REPO_DIR}/scripts/deploy.sh" /srv/cdm2026/deploy.sh
            sudo chmod +x /srv/cdm2026/deploy.sh

            APPS="fr de" /srv/cdm2026/deploy.sh
